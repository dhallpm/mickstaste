
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Micks Picks Social Graphics Studio</title>

<style>

body{
  margin:0;
  background:#050505;
  color:#fff;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.graphic{
  width:1080px;
  height:1080px;
  background:
    radial-gradient(circle at top right,rgba(255,226,138,.22),transparent 30%),
    linear-gradient(180deg,#101010,#050505);
  border:1px solid rgba(255,226,138,.2);
  border-radius:40px;
  padding:80px;
  box-sizing:border-box;
  position:relative;
  overflow:hidden;
}

.logo{
  font-size:28px;
  font-weight:1000;
  color:#ffe28a;
  letter-spacing:2px;
}

.headline{
  margin-top:120px;
  font-size:120px;
  font-weight:1000;
  line-height:.95;
  color:#fff6df;
}

.subtext{
  margin-top:30px;
  font-size:42px;
  color:#bdb39b;
  line-height:1.4;
}

.footer{
  position:absolute;
  bottom:60px;
  left:80px;
  font-size:28px;
  color:#36d47a;
  font-weight:900;
  letter-spacing:1px;
}

.glow{
  position:absolute;
  inset:auto -100px -100px auto;
  width:400px;
  height:400px;
  background:rgba(54,212,122,.12);
  filter:blur(120px);
  border-radius:50%;
}

</style>
</head>

<body>

<div class="graphic">

<div class="logo">
MICKS PICKS
</div>

<div class="headline">
CASHED
</div>

<div class="subtext">
A-tier edge delivered again.<br>
Positive CLV. Disciplined entry.<br>
Long-term EV remains strong.
</div>

<div class="footer">
@mickspicks • Premium Analytics
</div>

<div class="glow"></div>

</div>

</body>
</html>
