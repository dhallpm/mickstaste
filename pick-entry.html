<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Micks Picks Entry</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101319;
      --panel: #171b22;
      --field: #0f141b;
      --line: #2c3440;
      --text: #f4f7fb;
      --muted: #a8b2bf;
      --accent: #28d17c;
      --warn: #ffcd5c;
      --bad: #ff7676;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    a, button {
      color: var(--text);
      border: 1px solid var(--line);
      background: #202731;
      border-radius: 6px;
      min-height: 42px;
      padding: 0 14px;
      font: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #07120c;
      font-weight: 800;
    }

    button:disabled {
      opacity: .55;
      cursor: wait;
    }

    form {
      display: grid;
      gap: 22px;
      margin-top: 24px;
    }

    .section {
      padding: 20px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .section h2 {
      margin: 0 0 16px;
      font-size: 1rem;
      letter-spacing: 0;
      color: var(--muted);
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: .9rem;
    }

    input, select, textarea {
      width: 100%;
      min-height: 42px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--field);
      color: var(--text);
      font: inherit;
      padding: 10px 11px;
    }

    textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.45;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    #message {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #121820;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    #message.good { border-color: rgba(40, 209, 124, .7); }
    #message.bad { border-color: rgba(255, 118, 118, .75); }
    #message:empty { display: none; }

    .required {
      color: var(--warn);
    }

    .generator-result {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .generated-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111821;
    }

    .generated-card strong {
      display: block;
      margin-bottom: 6px;
    }

    @media (max-width: 820px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .span-2, .span-3, .span-4, .span-6, .span-8, .span-12 {
        grid-column: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Micks Picks Entry</h1>
      </div>
      <nav class="toolbar" aria-label="Admin links">
        <a href="/api/todays-picks" target="_blank" rel="noreferrer">Today&apos;s Picks</a>
        <button type="button" id="dryRunSync">Run Backup Dry Run</button>
      </nav>
    </header>

    <form id="pickForm">
      <section class="section">
        <h2>Run Micks Picks</h2>
        <div class="grid">
          <label class="span-3">Date
            <input id="generateDate" name="generateDate" type="date">
          </label>
          <label class="span-3">Sport
            <input id="generateSport" name="generateSport" autocomplete="off" placeholder="NBA">
          </label>
          <label class="span-3">League
            <input id="generateLeague" name="generateLeague" autocomplete="off" placeholder="NBA">
          </label>
          <label class="span-3">Mode
            <select id="generateMode" name="generateMode">
              <option value="review">Review</option>
              <option value="draft">Draft</option>
              <option value="publish">Publish</option>
            </select>
          </label>
          <label class="span-3">Max Picks
            <input id="generateMaxPicks" name="generateMaxPicks" inputmode="numeric" value="3">
          </label>
          <label class="span-3">Access
            <select id="generateAccess" name="generateAccess">
              <option value="auto">Auto</option>
              <option>Free</option>
              <option>VIP</option>
              <option>Premium</option>
            </select>
          </label>
          <div class="span-6 actions">
            <button type="button" class="primary" id="generatePicks">Run Micks Picks</button>
            <button type="button" id="generateDryRun">Review Dry Run</button>
            <a href="/api/todays-picks" target="_blank" rel="noreferrer">Open Today&apos;s Feed</a>
          </div>
          <output class="span-12 generator-result" id="generateResult" aria-live="polite"></output>
        </div>
      </section>

      <section class="section">
        <h2>Pick Card</h2>
        <div class="grid">
          <label class="span-3">Date <span class="required">required</span>
            <input id="date" name="date" type="date" required>
          </label>
          <label class="span-3">Sport
            <input name="sport" autocomplete="off" placeholder="NBA">
          </label>
          <label class="span-3">League
            <input name="league" autocomplete="off" placeholder="NBA">
          </label>
          <label class="span-3">Access <span class="required">required</span>
            <select name="access" required>
              <option>Free</option>
              <option>VIP</option>
              <option>Premium</option>
            </select>
          </label>

          <label class="span-6">Game <span class="required">required</span>
            <input name="game" required autocomplete="off" placeholder="Team A vs Team B">
          </label>
          <label class="span-6">Pick <span class="required">required</span>
            <input name="pick" required autocomplete="off" placeholder="Team A ML">
          </label>

          <label class="span-3">Bet Type <span class="required">required</span>
            <input name="betType" required autocomplete="off" placeholder="Moneyline">
          </label>
          <label class="span-3">Odds <span class="required">required</span>
            <input name="odds" required inputmode="numeric" placeholder="-110">
          </label>
          <label class="span-3">Sportsbook
            <input name="sportsbook" autocomplete="off" placeholder="BetRivers">
          </label>
          <label class="span-3">Units
            <input name="units" inputmode="decimal" placeholder="1">
          </label>

          <label class="span-3">Grade
            <input name="grade" autocomplete="off" placeholder="A">
          </label>
          <label class="span-3">Confidence
            <input name="confidence" inputmode="decimal" placeholder="60">
          </label>
          <label class="span-3">EV Edge
            <input name="evEdge" inputmode="decimal" placeholder="2.5">
          </label>
          <label class="span-3">Status
            <select name="status">
              <option>Active</option>
              <option>Posted</option>
              <option>Released</option>
              <option>Pregame</option>
              <option>Open</option>
            </select>
          </label>
        </div>
      </section>

      <section class="section">
        <h2>Analysis</h2>
        <div class="grid">
          <label class="span-6">Writeup
            <textarea name="writeup"></textarea>
          </label>
          <label class="span-6">Full Analysis
            <textarea name="fullAnalysis"></textarea>
          </label>
          <label class="span-4">Market Notes
            <textarea name="marketNotes"></textarea>
          </label>
          <label class="span-4">Injury Notes
            <textarea name="injuryNotes"></textarea>
          </label>
          <label class="span-4">Source Verification
            <textarea name="sourceVerification"></textarea>
          </label>
        </div>
      </section>

      <section class="section">
        <h2>Submit</h2>
        <div class="grid">
          <label class="span-6">Sync Secret
            <input id="syncSecret" name="syncSecret" type="password" autocomplete="current-password">
          </label>
          <div class="span-6 actions">
            <button type="submit" class="primary" id="submitPick">Submit Pick</button>
            <button type="reset">Reset</button>
          </div>
        </div>
      </section>
    </form>

    <output id="message" aria-live="polite"></output>
  </main>

  <script>
    const form = document.getElementById('pickForm')
    const message = document.getElementById('message')
    const submitPick = document.getElementById('submitPick')
    const dryRunSync = document.getElementById('dryRunSync')
    const generatePicks = document.getElementById('generatePicks')
    const generateDryRun = document.getElementById('generateDryRun')
    const generateResult = document.getElementById('generateResult')
    const requiredFields = ['date', 'game', 'pick', 'betType', 'odds', 'access']

    function todayKey() {
      const now = new Date()
      const offset = now.getTimezoneOffset()
      return new Date(now.getTime() - offset * 60000).toISOString().slice(0, 10)
    }

    function numberValue(value, fallback = '') {
      const cleaned = String(value || '').replace(/[^\d.+-]/g, '')
      if (!cleaned) return fallback
      const number = Number(cleaned)
      return Number.isFinite(number) ? number : fallback
    }

    function formData() {
      return Object.fromEntries(new FormData(form).entries())
    }

    function secretHeaders(data) {
      const secret = String(data.syncSecret || '').trim()
      return secret ? { 'x-sync-secret': secret } : {}
    }

    function show(text, good) {
      message.textContent = text
      message.className = good ? 'good' : 'bad'
    }

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char])
    }

    function validate(data) {
      const missing = requiredFields.filter(field => !String(data[field] || '').trim())
      if (missing.length) return `Missing required fields: ${missing.join(', ')}.`
      if (numberValue(data.odds, null) === null) return 'Odds must be a number like -110 or +145.'
      return ''
    }

    function pickPayload(data) {
      return {
        picks: [{
          date: data.date,
          sport: data.sport,
          league: data.league,
          game: data.game,
          pick: data.pick,
          betType: data.betType,
          access: data.access || 'Free',
          odds: numberValue(data.odds),
          sportsbook: data.sportsbook || 'BetRivers',
          units: numberValue(data.units, 1),
          grade: data.grade,
          confidence: numberValue(data.confidence),
          evEdge: numberValue(data.evEdge),
          status: data.status || 'Active',
          result: 'Pending',
          archiveStatus: 'Active',
          writeup: data.writeup,
          fullAnalysis: data.fullAnalysis,
          marketNotes: data.marketNotes,
          injuryNotes: data.injuryNotes,
          sourceVerification: data.sourceVerification
        }]
      }
    }

    async function postAdmin(action, data, body) {
      const response = await fetch(`/api/micks-admin?action=${encodeURIComponent(action)}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...secretHeaders(data)
        },
        body: JSON.stringify(body || {})
      })
      const result = await response.json().catch(() => ({ success: false, error: response.statusText }))
      if (!response.ok || (result.success === false && !result.needsDataProvider)) {
        throw new Error(result.error || `Request failed with ${response.status}`)
      }
      return result
    }

    function resultText(result) {
      const warnings = Array.isArray(result.warnings) && result.warnings.length
        ? `\nWarnings:\n- ${result.warnings.join('\n- ')}`
        : ''
      const errors = Array.isArray(result.errors) && result.errors.length
        ? `\nErrors:\n- ${result.errors.map(item => item.message || item.error || String(item)).join('\n- ')}`
        : ''
      return `Success\nCreated: ${result.created || 0}\nUpdated: ${result.updated || 0}\nSkipped: ${result.skipped || 0}${warnings}${errors}\n\nToday: /api/todays-picks\nBackup dry run: /api/micks-admin?action=run-sync&dryRun=1`
    }

    function generatorPayload(data, dryRun) {
      return {
        date: data.generateDate || todayKey(),
        sport: data.generateSport,
        league: data.generateLeague,
        mode: data.generateMode || 'review',
        maxPicks: numberValue(data.generateMaxPicks, 3),
        access: data.generateAccess || 'auto',
        allowSample: false,
        dryRun
      }
    }

    function renderGenerated(result) {
      if (result.needsOpenAI || result.needsDataProvider) {
        generateResult.innerHTML = `<div class="generated-card"><strong>Missing engine config</strong>${esc(result.message || 'OPENAI_API_KEY is required for Run Micks Picks.')}</div>`
        return
      }
      const cards = Array.isArray(result.cards) ? result.cards : []
      const header = `Generated: ${result.generated || cards.length || 0} | Created: ${result.created || 0} | Updated: ${result.updated || 0} | Mode: ${result.mode || 'review'}`
      const provider = result.providerStatus
        ? `<div class="generated-card"><strong>Engine</strong>${result.providerStatus.configured ? `Manual context: ${esc(result.providerStatus.source || result.providerStatus.type || 'provider')}` : 'OpenAI web search primary'}</div>`
        : ''
      const framework = Array.isArray(result.frameworkLoaded)
        ? `<div class="generated-card"><strong>Framework</strong>${result.frameworkLoaded.map(esc).join('<br>')}</div>`
        : ''
      const search = result.searchesRun !== undefined
        ? `<div class="generated-card"><strong>Search</strong>Searches: ${esc(result.searchesRun)}${result.model ? `<br>Model: ${esc(result.model)}` : ''}</div>`
        : ''
      const sources = Array.isArray(result.sourcesUsed) && result.sourcesUsed.length
        ? `<div class="generated-card"><strong>Sources</strong>${result.sourcesUsed.map(source => {
          const title = esc(source.title || source.url || 'Source')
          const url = esc(source.url || '')
          return url ? `<a href="${url}" target="_blank" rel="noreferrer">${title}</a>` : title
        }).join('<br>')}</div>`
        : ''
      const backup = result.backup
        ? `<div class="generated-card"><strong>Google Sheets Backup</strong>${esc(result.backup.skipped ? (result.backup.reason || 'Skipped') : `Updated ${result.backup.updated || result.backup.totalRows || 0}`)}</div>`
        : ''
      const warnings = Array.isArray(result.warnings) && result.warnings.length
        ? `<div class="generated-card"><strong>Warnings</strong>${result.warnings.map(esc).join('<br>')}</div>`
        : ''
      const cardHtml = cards.map(card => `
        <div class="generated-card">
          <strong>${esc(card.Pick || card.pick || 'Pick pending')} ${card.Odds || card.odds ? `(${esc(card.Odds || card.odds)})` : ''}</strong>
          ${esc(card.Game || card.game || '')}<br>
          ${esc(card['Bet Type'] || card.betType || '')} | ${esc(card.Access || card.access || '')} | ${esc(card.Status || card.status || '')} / ${esc(card['Release Status'] || card.releaseStatus || '')}<br>
          ${esc(card.Writeup || card.writeup || '')}
        </div>
      `).join('')
      generateResult.innerHTML = `<div class="generated-card"><strong>${esc(header)}</strong><a href="/api/todays-picks" target="_blank" rel="noreferrer">Open Today&apos;s Feed</a></div>${provider}${search}${sources}${framework}${backup}${warnings}${cardHtml}`
    }

    form.addEventListener('submit', async event => {
      event.preventDefault()
      const data = formData()
      const validation = validate(data)
      if (validation) {
        show(validation, false)
        return
      }

      submitPick.disabled = true
      try {
        const result = await postAdmin('ingest-picks', data, pickPayload(data))
        show(resultText(result), true)
      } catch (error) {
        show(error.message, false)
      } finally {
        submitPick.disabled = false
      }
    })

    dryRunSync.addEventListener('click', async () => {
      const data = formData()
      dryRunSync.disabled = true
      try {
        const result = await postAdmin('run-sync', data, { dryRun: true })
        show(resultText(result.airtableToSheets || result), true)
      } catch (error) {
        show(error.message, false)
      } finally {
        dryRunSync.disabled = false
      }
    })

    async function runGenerator(dryRun) {
      const data = formData()
      const button = dryRun ? generateDryRun : generatePicks
      button.disabled = true
      try {
        const result = await postAdmin('run-micks-picks', data, generatorPayload(data, dryRun))
        renderGenerated(result)
        show(result.success === false ? (result.message || result.error || 'Generation needs attention.') : resultText(result), result.success !== false)
      } catch (error) {
        generateResult.innerHTML = ''
        show(error.message, false)
      } finally {
        button.disabled = false
      }
    }

    generatePicks.addEventListener('click', () => runGenerator(false))
    generateDryRun.addEventListener('click', () => runGenerator(true))

    form.addEventListener('reset', () => {
      setTimeout(() => {
        form.elements.date.value = todayKey()
        form.elements.generateDate.value = todayKey()
        form.elements.generateMode.value = 'review'
        form.elements.generateAccess.value = 'auto'
        form.elements.generateMaxPicks.value = '3'
        form.elements.access.value = 'Free'
        form.elements.units.value = '1'
        form.elements.status.value = 'Active'
        form.elements.sportsbook.value = 'BetRivers'
        message.textContent = ''
        message.className = ''
      }, 0)
    })

    form.elements.date.value = todayKey()
    form.elements.generateDate.value = todayKey()
    form.elements.generateMode.value = 'review'
    form.elements.generateAccess.value = 'auto'
    form.elements.generateMaxPicks.value = '3'
    form.elements.access.value = 'Free'
    form.elements.units.value = '1'
    form.elements.status.value = 'Active'
    form.elements.sportsbook.value = 'BetRivers'
  </script>
</body>
</html>
